<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
        <legend><h1>HTML FORM</h1></legend>
        <label for="username">Username : </label>
        <input type="text" id="username" name="username" placeholder="Username..." required> <br> <br>

        <label for="password">Password : </label>
        <input type="password" id="password" name="password" placeholder="password..."> <br> <br>

        <label for="email">Email : </label>
        <input type="email" id="email" name="email"> <br> <br>
        <p>Select your gender : </p>
        <input type="radio" id="gender" name="gender" value="male">
        <label for="gender">male </label>   
        <input type="radio" id="gender" name="gender" value="female">
        <label for="gender">female </label>  
        <input type="radio" id="gender" name="gender" value="other">
        <label for="gender">other </label>  <br> <br>
        <br><br>
        <label for="birth">Date of birth : </label>
        <input type="date" name="date" id="birth">
        <br><br>
        <label for="eyecolor">Eyes color: </label>
        <input type="color" name="eye color" id="eyecolor">
        <br><br>
        <label for="country">Country :</label>
        <Select id="country" name="country">
            <optgroup label="Africa" >
                <option value="Egypt">Egypt</option>
                <option value="Nigeria">Nigeria</option>
                <option value="South Africa">South Africa</option>
            </optgroup>
            <optgroup label="Asia">
                <option value="India">India</option>
                <option value="China">China</option>
                <option value="Japan">Japan</option>
            </optgroup>
            <optgroup label="Europe">
                <option value="France">France</option>
                <option value="Germany">Germany</option>
                <option value="Italy">Italy</option>
            </optgroup>
            <optgroup label="North America">
                <option value="Canada">Canada</option>
                <option value="Mexico">Mexico</option>
                <option value="United States">United States</option>
            </optgroup>
            <optgroup label="South America">
                <option value="Argentina">Argentina</option>
                <option value="Brazil">Brazil</option>
                <option value="Colombia">Colombia</option>
            </optgroup>
            <optgroup label="Australia">
                <option value="Australia">Australia</option>
                <option value="Fiji">Fiji</option>
                <option value="New Zealand">New Zealand</option>
            </optgroup>
        </Select> <br><br>
        <p>Comment : </p>
        <textarea name="comment" id="comment" cols="30" rows="2"></textarea> <br><br>
        <input type="submit" value="Submit Form">
        </fieldset>
    </form>
</body>
</html>
